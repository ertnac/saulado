<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saulado.ai | Your AI Reviewer Buddy</title>

    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
        }

        .custom-scroll::-webkit-scrollbar {
            width: 5px;
        }

        .custom-scroll::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }

        .answer-highlight {
            background-color: #eff6ff;
            border-bottom: 2px solid #6366f1;
            padding: 0 4px;
            border-radius: 4px;
            font-weight: 700;
            color: #4338ca;
        }

        .modal-active {
            display: flex !important;
            animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(20px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        @keyframes bounce-slow {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .lado-float {
            animation: bounce-slow 3s ease-in-out infinite;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-8px);
            }

            75% {
                transform: translateX(8px);
            }
        }

        .shake-error {
            animation: shake 0.3s ease-in-out;
            border-color: #ef4444 !important;
        }
    </style>
</head>

<body class="h-screen overflow-hidden flex">

    <!-- SIDEBAR -->
    <aside class="w-72 bg-white border-r border-slate-200 flex flex-col shrink-0 z-10 shadow-sm">
        <div class="p-8">
            <div class="flex items-center gap-2 mb-8">
                <div class="text-3xl lado-float">🦉</div>
                <h1 class="text-xl font-extrabold text-slate-900 tracking-tighter">SAULADO<span
                        class="text-indigo-600">.AI</span></h1>
            </div>
            <button onclick="showModal('modalMainDeck')"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3.5 rounded-2xl font-bold text-sm transition-all shadow-lg shadow-indigo-100">
                + Bagong Collection
            </button>
        </div>
        <nav id="sidebarNav" class="flex-1 overflow-y-auto custom-scroll px-4 space-y-1 pb-10"></nav>
    </aside>

    <!-- MAIN PANEL -->
    <main class="flex-1 flex flex-col relative overflow-hidden">
        <header
            class="h-20 bg-white/80 backdrop-blur-md border-b border-slate-200 flex items-center justify-between px-10 shrink-0 z-20">
            <div>
                <div id="breadcrumb" class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Library
                </div>
                <div id="activeDeckTitle" class="text-sm font-bold text-slate-800">Pumili ng Reviewer</div>
            </div>

            <div class="flex items-center gap-3">
                <button onclick="showModal('modalMagicImport')"
                    class="bg-amber-400 hover:bg-amber-500 text-white px-5 py-2.5 rounded-xl text-xs font-black transition-all flex items-center gap-2">
                    ✨ MAGIC IMPORT
                </button>
                <button id="btnStartLearn" onclick="startLearning()"
                    class="hidden bg-slate-900 hover:bg-indigo-600 text-white px-8 py-2.5 rounded-xl text-xs font-black shadow-xl transition-all">
                    🚀 SIMULAN NA!
                </button>
            </div>
        </header>

        <div id="workspace" class="flex-1 overflow-y-auto custom-scroll p-10">
            <div id="emptyState" class="hidden flex flex-col items-center justify-center h-full text-center space-y-4">
                <div class="text-7xl lado-float">🦉</div>
                <h2 class="text-xl font-extrabold text-slate-800">"Uy, wala pang laman dito!"</h2>
                <p class="text-slate-400 text-sm max-w-xs">Mag-import ka na ng PDF o gumawa ng card para simulan na
                    natin ang pag-aaral.</p>
            </div>

            <div id="contentArea" class="max-w-4xl mx-auto space-y-10 pb-24">
                <!-- Creator -->
                <section class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm">
                    <div id="editor" contenteditable="true" placeholder="I-type ang definition dito..."
                        class="w-full min-h-[60px] text-xl leading-relaxed focus:outline-none mb-6 empty:before:content-[attr(placeholder)] empty:before:text-slate-300">
                    </div>
                    <div class="flex gap-3">
                        <button onclick="markAsAnswer()"
                            class="bg-indigo-50 text-indigo-600 px-6 py-3 rounded-xl font-bold text-xs hover:bg-indigo-100 transition-all">✨
                            Highlight Answer</button>
                        <button onclick="saveCard()"
                            class="flex-1 bg-indigo-600 text-white px-6 py-3 rounded-xl font-black text-xs">SAVE
                            CARD</button>
                    </div>
                </section>

                <section id="subFolderSection" class="hidden">
                    <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 ml-2 italic">
                        Sub-Folders</h3>
                    <div id="subFolderGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
                </section>

                <section id="cardsSection">
                    <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 ml-2 italic">
                        Reviewer Cards</h3>
                    <div id="cardsGrid" class="grid grid-cols-1 gap-4"></div>
                </section>
            </div>
        </div>
    </main>

    <!-- MODALS -->
    <div id="modalOverlay"
        class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
        <div id="modalMagicImport" class="bg-white w-full max-w-xl rounded-[2.5rem] shadow-2xl p-10 hidden flex-col">
            <h3 class="text-2xl font-black mb-2 italic">Magic Import ✨</h3>
            <p class="text-slate-400 text-xs mb-6 font-medium italic">"Ako na ang bahala mag-extract ng keywords para
                sa'yo." - Lado</p>
            <input type="file" id="magicFile" accept=".txt,.docx,.pdf" onchange="handleFileImport(event)"
                class="block w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-black file:bg-indigo-600 file:text-white mb-6">
            <textarea id="magicInput" placeholder="O kaya i-paste ang text dito: Term - Definition..."
                class="w-full h-32 bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 mb-6 outline-none text-xs font-mono"></textarea>
            <div class="flex gap-3">
                <button onclick="hideModals()" class="px-6 py-3 font-bold text-slate-400 text-xs">Cancel</button>
                <button onclick="processMagicImport(document.getElementById('magicInput').value)"
                    class="flex-1 bg-amber-500 text-white py-3 rounded-xl font-black text-xs">Generate Reviewer</button>
            </div>
        </div>

        <div id="modalMainDeck" class="bg-white w-full max-w-sm rounded-[2.5rem] p-10 hidden flex-col text-center">
            <h3 class="text-xl font-black mb-6 italic">Bagong Collection</h3>
            <input id="inputMainDeck" type="text" placeholder="Hal: Science Quiz"
                class="w-full bg-slate-50 p-4 rounded-xl mb-6 outline-indigo-500 font-bold">
            <button onclick="actionCreateMainDeck()"
                class="w-full bg-indigo-600 text-white py-4 rounded-xl font-black">LIKA NA!</button>
        </div>
    </div>

    <!-- MINIMALIST LEARN OVERLAY -->
    <div id="learnOverlay"
        class="fixed inset-0 bg-slate-50 z-[60] translate-y-full transition-transform duration-500 flex flex-col items-center justify-center p-6">
        <!-- Progress -->
        <div class="absolute top-0 left-0 w-full p-8 flex justify-between items-center">
            <button onclick="exitLearning()"
                class="group flex items-center gap-2 text-slate-400 hover:text-slate-900 transition-all">
                <span class="text-2xl group-hover:-translate-x-1 transition-transform">←</span>
                <span class="font-bold text-[10px] tracking-widest uppercase">Exit Study</span>
            </button>
            <div class="flex flex-col items-center flex-1 max-w-sm px-10">
                <div class="w-full h-2 bg-slate-200 rounded-full overflow-hidden">
                    <div id="quizProgressBar" class="h-full bg-indigo-600 transition-all duration-700"
                        style="width: 0%"></div>
                </div>
            </div>
            <div class="flex items-center gap-3 bg-white px-5 py-2.5 rounded-2xl border border-slate-200 shadow-sm">
                <span class="text-orange-500">🔥</span>
                <span id="streakCount" class="font-black text-slate-700">0</span>
            </div>
        </div>

        <!-- Character & Quiz -->
        <div class="w-full max-w-2xl relative">
            <!-- Lado Feedback Character -->
            <div id="ladoChar"
                class="absolute -top-24 left-1/2 -translate-x-1/2 text-7xl transition-all duration-300 scale-100">
                🦉
            </div>

            <div id="questionBox"
                class="bg-white rounded-[3.5rem] shadow-[0_40px_80px_-20px_rgba(0,0,0,0.06)] p-12 border border-slate-100 transition-all">
                <div id="quizCategory"
                    class="text-[10px] font-black text-indigo-400 tracking-[0.4em] mb-10 uppercase text-center">SAULADO
                    MODE</div>

                <div id="quizPrompt"
                    class="text-2xl md:text-3xl font-bold text-slate-800 leading-relaxed text-center mb-12"></div>

                <div id="interactionZone" class="space-y-3"></div>

                <div id="quizFeedback" class="mt-8 text-center font-bold text-lg hidden"></div>
            </div>

            <div class="mt-8 flex gap-4">
                <button id="btnToggleMode" onclick="toggleMode()"
                    class="flex-1 bg-white border-2 border-slate-100 text-slate-500 py-5 rounded-3xl font-bold hover:bg-slate-100 transition-all text-sm">
                    Hindi sigurado? (Choices)
                </button>
                <button id="btnAction" onclick="handleMainAction()"
                    class="flex-[2] bg-indigo-600 text-white py-5 rounded-3xl font-black shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition-all uppercase tracking-widest text-sm">
                    Check Answer
                </button>
            </div>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let library = JSON.parse(localStorage.getItem('saulado_data')) || [
            { id: 1, name: "Sample Subject", subDecks: [], cards: [{ html: '<span class="answer-highlight">Kabisado</span> ang tawag sa taong saulado na ang lahat.' }] }
        ];
        let activeDeck = library[0];
        let queue = [], qIdx = 0, streak = 0;
        let currentMode = 'type';
        let currentCorrectAnswer = "";
        let quizState = 'asking';

        function init() { renderSidebar(); renderWorkspace(); }
        function save() { localStorage.setItem('saulado_data', JSON.stringify(library)); }

        // --- LADO CHARACTER REACTIONS ---
        const LADO_MOODS = {
            idle: '🦉',
            thinking: '🧐',
            correct: '🎓',
            wrong: '✍️',
            finish: '🎉'
        };

        function setLadoMood(mood) {
            const el = document.getElementById('ladoChar');
            el.innerText = LADO_MOODS[mood] || '🦉';
            el.classList.add('scale-125');
            setTimeout(() => el.classList.remove('scale-125'), 300);
        }

        // --- CORE NAV ---
        function selectDeck(id) {
            activeDeck = findDeck(id, library);
            renderSidebar();
            renderWorkspace();
        }

        function findDeck(id, list) {
            for (let d of list) {
                if (d.id === id) return d;
                if (d.subDecks) { let f = findDeck(id, d.subDecks); if (f) return f; }
            }
        }

        // --- MAGIC ENGINE ---
        async function handleFileImport(event) {
            const file = event.target.files[0];
            if (!file) return;
            try {
                let text = "";
                const ext = file.name.split('.').pop().toLowerCase();
                if (ext === 'txt') text = await file.text();
                else if (ext === 'docx') {
                    const res = await mammoth.extractRawText({ arrayBuffer: await file.arrayBuffer() });
                    text = res.value;
                } else if (ext === 'pdf') {
                    const pdf = await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const content = await page.getTextContent();
                        text += content.items.map(s => s.str).join(" ") + "\n";
                    }
                }
                processMagicImport(text);
            } catch (e) { alert("Lado had trouble reading that file!"); }
        }

        function processMagicImport(rawText) {
            if (!rawText.trim()) return;
            const lines = rawText.split(/\r?\n/).map(l => l.trim()).filter(l => l.length > 5);
            let count = 0;
            lines.forEach(line => {
                const separators = [/ - /, /: /, / – /];
                for (let sep of separators) {
                    if (sep.test(line)) {
                        const parts = line.split(sep);
                        const term = parts.shift().trim();
                        const def = parts.join(' ').trim();
                        activeDeck.cards.push({ html: `<span class="answer-highlight">${term}</span> - ${def}` });
                        count++;
                        break;
                    }
                }
            });
            save(); renderWorkspace(); hideModals();
            alert(`Lado created ${count} cards for you!`);
        }

        // --- GAMIFIED LEARN ENGINE ---
        function startLearning() {
            if (activeDeck.cards.length === 0) return;
            queue = [...activeDeck.cards].sort(() => Math.random() - 0.5);
            qIdx = 0; streak = 0;
            document.getElementById('streakCount').innerText = streak;
            document.getElementById('learnOverlay').classList.remove('translate-y-full');
            loadQuestion();
        }

        function loadQuestion() {
            quizState = 'asking';
            currentMode = 'type';
            setLadoMood('idle');
            const card = queue[qIdx];

            const temp = document.createElement('div');
            temp.innerHTML = card.html;
            const answerSpan = temp.querySelector('.answer-highlight');
            currentCorrectAnswer = answerSpan ? answerSpan.innerText.trim() : "";

            let promptHtml = card.html.replace(/<span class="answer-highlight">.*?<\/span>/g, '<span class="px-2 border-b-2 border-indigo-200 text-indigo-500/0 select-none">__________</span>');
            document.getElementById('quizPrompt').innerHTML = promptHtml;

            document.getElementById('quizFeedback').classList.add('hidden');
            document.getElementById('btnAction').innerText = "Suriin ang Sagot";
            document.getElementById('btnToggleMode').classList.remove('hidden');
            document.getElementById('btnToggleMode').innerText = "Hindi sigurado? (Choices)";

            const prog = ((qIdx + 1) / queue.length) * 100;
            document.getElementById('quizProgressBar').style.width = prog + "%";
            renderInteraction();
        }

        function renderInteraction() {
            const zone = document.getElementById('interactionZone');
            zone.innerHTML = '';

            if (currentMode === 'type') {
                document.getElementById('quizCategory').innerText = "Kabisado Mode";
                const input = document.createElement('input');
                input.type = "text";
                input.id = "userAnswer";
                input.placeholder = "Isulat ang sagot...";
                input.className = "w-full bg-slate-50 border-2 border-slate-100 rounded-3xl p-5 text-center text-xl font-bold focus:border-indigo-500 outline-none transition-all";
                input.onkeyup = (e) => { if (e.key === 'Enter') handleMainAction(); };
                zone.appendChild(input);
                setTimeout(() => input.focus(), 400);
            } else {
                document.getElementById('quizCategory').innerText = "Recognition Mode";
                setLadoMood('thinking');
                const choices = generateChoices();
                choices.forEach(choice => {
                    const btn = document.createElement('button');
                    btn.className = "w-full bg-white border-2 border-slate-100 p-4 rounded-2xl text-lg font-bold hover:border-indigo-500 hover:bg-indigo-50 transition-all text-slate-700";
                    btn.innerText = choice;
                    btn.onclick = () => submitAnswer(choice);
                    zone.appendChild(btn);
                });
            }
        }

        function generateChoices() {
            const correct = currentCorrectAnswer.toLowerCase();
            if (correct === 'true' || correct === 'false') return ['True', 'False'];

            let pool = [];
            activeDeck.cards.forEach(c => {
                const t = document.createElement('div');
                t.innerHTML = c.html;
                const ans = t.querySelector('.answer-highlight')?.innerText;
                if (ans && ans.toLowerCase() !== correct) pool.push(ans);
            });

            let decoys = [...new Set(pool)].sort(() => 0.5 - Math.random()).slice(0, 3);
            return [currentCorrectAnswer, ...decoys].sort(() => 0.5 - Math.random());
        }

        function toggleMode() {
            currentMode = (currentMode === 'type') ? 'choice' : 'type';
            document.getElementById('btnToggleMode').innerText = currentMode === 'type' ? "Hindi sigurado? (Choices)" : "Bumalik sa Pag-type";
            renderInteraction();
        }

        function handleMainAction() {
            if (quizState === 'asking') {
                const val = document.getElementById('userAnswer')?.value;
                if (val) submitAnswer(val);
            } else { nextQuestion(); }
        }

        function submitAnswer(userVal) {
            const isCorrect = userVal.trim().toLowerCase() === currentCorrectAnswer.toLowerCase();
            const feedback = document.getElementById('quizFeedback');

            quizState = 'feedback';
            feedback.classList.remove('hidden');

            if (isCorrect) {
                streak++;
                setLadoMood('correct');
                feedback.innerText = "Ang galing! Saulado mo na! ✨";
                feedback.className = "mt-8 text-center font-bold text-emerald-500 animate-bounce";
                confetti({ particleCount: 80, spread: 60, origin: { y: 0.8 } });
            } else {
                streak = 0;
                setLadoMood('wrong');
                feedback.innerText = `Mali, ang tamang sagot ay: ${currentCorrectAnswer}`;
                feedback.className = "mt-8 text-center font-bold text-rose-500";
                document.getElementById('questionBox').classList.add('shake-error');
                setTimeout(() => document.getElementById('questionBox').classList.remove('shake-error'), 400);
            }

            document.getElementById('streakCount').innerText = streak;
            document.getElementById('btnAction').innerText = "Susunod →";
            document.getElementById('btnToggleMode').classList.add('hidden');

            if (currentMode === 'type') document.getElementById('userAnswer').disabled = true;
            else document.querySelectorAll('#interactionZone button').forEach(b => b.disabled = true);
        }

        function nextQuestion() {
            qIdx++;
            if (qIdx < queue.length) loadQuestion();
            else {
                setLadoMood('finish');
                confetti({ particleCount: 200, spread: 100 });
                alert("Yown! Saulado mo na ang buong deck!");
                exitLearning();
            }
        }

        function exitLearning() { document.getElementById('learnOverlay').classList.add('translate-y-full'); }

        // --- UI ---
        function renderSidebar() {
            const container = document.getElementById('sidebarNav');
            container.innerHTML = '';
            const renderRecursive = (decks, level = 0) => {
                decks.forEach(deck => {
                    const isActive = activeDeck.id === deck.id;
                    const div = document.createElement('div');
                    div.onclick = () => selectDeck(deck.id);
                    div.className = `px-4 py-3 rounded-2xl cursor-pointer text-sm font-bold mb-1 transition-all ${isActive ? 'bg-indigo-50 text-indigo-700' : 'text-slate-400 hover:bg-slate-50'}`;
                    div.style.marginLeft = (level * 15) + "px";
                    div.innerText = (level > 0 ? "↳ " : "") + deck.name;
                    container.appendChild(div);
                    if (deck.subDecks) renderRecursive(deck.subDecks, level + 1);
                });
            };
            renderRecursive(library);
        }

        function renderWorkspace() {
            document.getElementById('activeDeckTitle').innerText = activeDeck.name;
            document.getElementById('btnStartLearn').style.display = activeDeck.cards.length > 0 ? 'block' : 'none';

            const hasContent = activeDeck.cards.length > 0 || activeDeck.subDecks.length > 0;
            document.getElementById('emptyState').style.display = hasContent ? 'none' : 'flex';
            document.getElementById('contentArea').style.display = hasContent ? 'block' : 'none';

            const fGrid = document.getElementById('subFolderGrid');
            fGrid.innerHTML = '';
            if (activeDeck.subDecks.length > 0) {
                document.getElementById('subFolderSection').classList.remove('hidden');
                activeDeck.subDecks.forEach(sub => {
                    fGrid.innerHTML += `<div onclick="selectDeck(${sub.id})" class="bg-white p-5 rounded-[2rem] border border-slate-100 hover:border-indigo-400 cursor-pointer text-center shadow-sm transition-all group">
                        <div class="text-2xl mb-1 group-hover:scale-110 transition-transform">📂</div><h4 class="text-[10px] font-bold truncate uppercase tracking-tighter">${sub.name}</h4>
                    </div>`;
                });
            } else document.getElementById('subFolderSection').classList.add('hidden');

            const cGrid = document.getElementById('cardsGrid');
            cGrid.innerHTML = '';
            activeDeck.cards.forEach((card, idx) => {
                cGrid.innerHTML += `<div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm relative group">
                    <button onclick="deleteCard(${idx})" class="absolute top-6 right-6 text-slate-200 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all">✕</button>
                    <div class="text-lg text-slate-700 leading-relaxed">${card.html}</div>
                </div>`;
            });
        }

        function showModal(id) { document.getElementById('modalOverlay').classList.add('modal-active'); document.getElementById(id).classList.remove('hidden'); document.getElementById(id).classList.add('flex'); }
        function hideModals() { document.getElementById('modalOverlay').classList.remove('modal-active'); document.querySelectorAll('#modalOverlay > div').forEach(d => d.classList.add('hidden')); }

        function actionCreateMainDeck() {
            const n = document.getElementById('inputMainDeck').value;
            if (n) { library.push({ id: Date.now(), name: n, subDecks: [], cards: [] }); save(); renderSidebar(); hideModals(); }
        }

        function markAsAnswer() {
            const sel = window.getSelection();
            if (sel.rangeCount) {
                const span = document.createElement('span'); span.className = 'answer-highlight';
                sel.getRangeAt(0).surroundContents(span);
            }
        }

        function saveCard() {
            const ed = document.getElementById('editor');
            if (!ed.innerText.trim()) return;
            activeDeck.cards.push({ html: ed.innerHTML });
            ed.innerHTML = ''; save(); renderWorkspace();
        }

        function deleteCard(idx) { if (confirm('Burahin ito?')) { activeDeck.cards.splice(idx, 1); save(); renderWorkspace(); } }

        init();
    </script>
</body>

</html>
