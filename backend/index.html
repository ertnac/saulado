    <!DOCTYPE html>
    <html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Saulado.ai | Custom AI Reviewer</title>

        <!-- Libraries -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

        <style>
            @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');

            body {
                font-family: 'Plus Jakarta Sans', sans-serif;
                background-color: #f8fafc;
                color: #1e293b;
            }

            .custom-scroll::-webkit-scrollbar {
                width: 5px;
            }

            .custom-scroll::-webkit-scrollbar-thumb {
                background: #e2e8f0;
                border-radius: 10px;
            }

            .answer-highlight {
                background-color: #eff6ff;
                border-bottom: 2px solid #6366f1;
                padding: 0 4px;
                border-radius: 4px;
                font-weight: 700;
                color: #4338ca;
            }

            .modal-active {
                display: flex !important;
                animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            }

            @keyframes popIn {
                from {
                    opacity: 0;
                    transform: scale(0.9) translateY(20px);
                }

                to {
                    opacity: 1;
                    transform: scale(1) translateY(0);
                }
            }

            .lado-float {
                animation: bounce-slow 3s ease-in-out infinite;
            }

            @keyframes bounce-slow {

                0%,
                100% {
                    transform: translateY(0);
                }

                50% {
                    transform: translateY(-10px);
                }
            }

            .chevron {
                transition: transform 0.2s ease;
                display: inline-block;
                width: 12px;
                cursor: pointer;
            }

            .chevron.open {
                transform: rotate(90deg);
            }

            .study-btn-sm {
                opacity: 0;
                transition: all 0.2s;
            }

            .sidebar-item:hover .study-btn-sm {
                opacity: 1;
            }
        </style>
    </head>

    <body class="h-screen overflow-hidden flex">

        <!-- SIDEBAR -->
        <aside class="w-72 bg-white border-r border-slate-200 flex flex-col shrink-0 z-10 shadow-sm">
            <div class="p-8 text-center">
                <div class="text-3xl lado-float mb-2">🦉</div>
                <h1 class="text-xl font-extrabold text-slate-900 tracking-tighter mb-6">SAULADO<span
                        class="text-indigo-600">.AI</span></h1>
                <button onclick="showModal('modalMainDeck')"
                    class="w-full bg-indigo-600 text-white py-3.5 rounded-2xl font-bold text-sm shadow-lg shadow-indigo-100">+
                    Bagong Collection</button>
            </div>
            <nav id="sidebarNav" class="flex-1 overflow-y-auto custom-scroll px-4 space-y-1 pb-10"></nav>
        </aside>

        <!-- MAIN PANEL -->
        <main class="flex-1 flex flex-col relative overflow-hidden">
            <header
                class="h-20 bg-white/80 backdrop-blur-md border-b border-slate-200 flex items-center justify-between px-10 shrink-0 z-20">
                <div>
                    <div id="breadcrumb" class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Library
                    </div>
                    <div id="activeDeckTitle" class="text-sm font-bold text-slate-800">Pumili ng Reviewer</div>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="showModal('modalMagicImport')"
                        class="bg-amber-400 text-white px-5 py-2.5 rounded-xl text-xs font-black transition-all">✨ MAGIC
                        IMPORT</button>
                    <button id="btnStartLearn" onclick="prepareStudy()"
                        class="hidden bg-slate-900 text-white px-8 py-2.5 rounded-xl text-xs font-black shadow-xl uppercase tracking-tighter">🚀
                        SIMULAN NA!</button>
                </div>
            </header>

            <div id="workspace" class="flex-1 overflow-y-auto custom-scroll p-10">
                <div class="max-w-4xl mx-auto space-y-10 pb-24">
                    <div id="masteryContainer" class="hidden"></div>
                    <section class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm">
                        <div id="editor" contenteditable="true" placeholder="I-type ang definition dito..."
                            class="w-full min-h-[60px] text-xl leading-relaxed focus:outline-none mb-6 empty:before:content-[attr(placeholder)] empty:before:text-slate-300">
                        </div>
                        <div class="flex gap-3">
                            <button onclick="markAsAnswer()"
                                class="bg-indigo-50 text-indigo-600 px-6 py-3 rounded-xl font-bold text-xs">✨ Highlight
                                Answer</button>
                            <button onclick="saveCard()"
                                class="flex-1 bg-indigo-600 text-white px-6 py-3 rounded-xl font-black text-xs">SAVE
                                CARD</button>
                        </div>
                    </section>
                    <section id="subFolderSection">
                        <div class="flex justify-between items-center mb-4 ml-2">
                            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest italic">Sub-Folders
                            </h3>
                            <button onclick="showModal('modalSubDeck')"
                                class="text-[10px] bg-slate-100 text-indigo-600 px-3 py-1 rounded-full font-bold">+ ADD
                                SUB-DECK</button>
                        </div>
                        <div id="subFolderGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
                    </section>
                    <section id="cardsSection">
                        <div class="flex justify-between items-center mb-4 ml-2">
                            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest italic">Reviewer
                                Cards</h3>
                            <div id="cardControls" class="flex gap-2 hidden">
                                <button onclick="shuffleCards()"
                                    class="text-[10px] bg-slate-100 text-slate-600 px-3 py-1 rounded-full font-bold">🔀
                                    SHUFFLE</button>
                                <button onclick="resetOrder()"
                                    class="text-[10px] bg-slate-100 text-indigo-600 px-3 py-1 rounded-full font-bold">🕒
                                    DEFAULT</button>
                                <button onclick="deleteAllCards()"
                                    class="text-[10px] bg-rose-50 text-rose-500 px-3 py-1 rounded-full font-bold">🗑️ CLEAR
                                    ALL</button>
                                <button id="delDeckBtn"
                                    class="text-[10px] bg-rose-50 text-rose-500 px-3 py-1 rounded-full font-bold">🔥 DEL
                                    DECK</button>
                            </div>
                        </div>
                        <div id="cardsGrid" class="grid grid-cols-1 gap-4"></div>
                    </section>
                </div>
            </div>
        </main>

        <!-- QUIZ OVERLAY -->
        <div id="learnOverlay"
            class="fixed inset-0 bg-slate-50 z-[60] translate-y-full transition-transform duration-500 flex flex-col items-center justify-center p-6 overflow-y-auto custom-scroll">
            <div
                class="absolute top-0 left-0 w-full p-8 flex justify-between items-center bg-slate-50/80 backdrop-blur-sm z-10">
                <button onclick="exitLearning()" class="font-black text-[10px] text-slate-400 uppercase tracking-widest">←
                    EXIT STUDY</button>
                <div class="flex-1 max-w-xs mx-10 h-2 bg-slate-200 rounded-full overflow-hidden">
                    <div id="quizProgressBar" class="h-full bg-indigo-600 transition-all" style="width: 0%"></div>
                </div>
                <div class="bg-white px-4 py-2 rounded-xl border font-black text-slate-700">🔥 <span
                        id="streakCount">0</span></div>
            </div>
            <div id="quizContainer" class="w-full max-w-2xl mt-20">
                <div id="ladoChar" class="text-7xl text-center mb-6">🦉</div>
                <div id="questionBox" class="bg-white rounded-[3.5rem] shadow-xl p-12 border border-slate-100 text-center">
                    <div id="quizModeLabel" class="text-[10px] font-black text-indigo-400 tracking-widest mb-4 uppercase">
                        Kabisado Mode</div>
                    <div id="quizPrompt" class="text-2xl font-bold text-slate-800 mb-10 leading-relaxed"></div>
                    <div id="interactionZone" class="grid grid-cols-1 gap-3"></div>
                    <div id="quizFeedback" class="mt-8 font-bold text-lg min-h-[2rem]"></div>
                </div>
                <div class="flex gap-4 mt-8">
                    <button id="btnToggleMode" onclick="toggleQuizMode()"
                        class="flex-1 bg-white border-2 border-slate-200 text-slate-500 py-5 rounded-3xl font-bold hover:bg-slate-100 transition-all">Hindi
                        Sigurado? (Choices)</button>
                    <button id="btnAction" onclick="handleMainAction()"
                        class="flex-[2] bg-indigo-600 text-white py-5 rounded-3xl font-black shadow-lg uppercase tracking-widest">Suriin
                        ang Sagot</button>
                </div>
            </div>
            <div id="resultsScreen" class="hidden w-full max-w-2xl text-center py-20">
                <h2 class="text-4xl font-black mb-10">Study Session Done! 🎉</h2>
                <div class="bg-white p-10 rounded-[3rem] shadow-xl mb-6">
                    <canvas id="scoreChart" class="mx-auto mb-6" width="200" height="200"></canvas>
                    <div id="scoreText" class="text-2xl font-black text-slate-700"></div>
                </div>
                <div id="restudyMistakesContainer" class="mb-10"></div>
                <div class="text-left mb-10">
                    <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4 ml-4">Detailed Review</h3>
                    <div id="summaryList" class="space-y-3"></div>
                </div>
                <button onclick="exitLearning()" class="w-full bg-slate-900 text-white py-5 rounded-3xl font-black">BUMALIK
                    SA LIBRARY</button>
            </div>
        </div>

        <!-- MODALS -->
        <div id="modalOverlay"
            class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
            <!-- Study Settings Modal (NEW) -->
            <div id="modalStudySettings" class="bg-white w-full max-w-sm rounded-[2.5rem] p-10 hidden flex-col">
                <h3 class="text-center font-black mb-2 text-xl italic">Study Mode 🚀</h3>
                <p id="availableCardsText" class="text-center text-[10px] font-bold text-slate-400 uppercase mb-6"></p>
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2 mb-1 block">Ilang cards ang
                            sasagutan?</label>
                        <input id="inputCardCount" type="number"
                            class="w-full bg-slate-50 p-4 rounded-xl font-bold outline-indigo-500"
                            placeholder="Lahat (All)">
                    </div>
                    <button onclick="confirmStudySettings()"
                        class="w-full bg-indigo-600 text-white py-4 rounded-xl font-black shadow-lg">MAG-START NA!</button>
                    <button onclick="hideModals()" class="w-full text-slate-400 text-xs font-bold py-2">Cancel</button>
                </div>
            </div>

            <div id="modalMainDeck" class="bg-white w-full max-w-sm rounded-[2.5rem] p-10 hidden flex-col">
                <h3 class="text-center font-black mb-6">Bagong Collection</h3>
                <input id="inputMainDeck" type="text" placeholder="Science"
                    class="w-full bg-slate-50 p-4 rounded-xl mb-4 font-bold">
                <button onclick="actionCreateMainDeck()"
                    class="w-full bg-indigo-600 text-white py-4 rounded-xl font-black">LIKA NA!</button>
            </div>
            <div id="modalSubDeck" class="bg-white w-full max-w-sm rounded-[2.5rem] p-10 hidden flex-col">
                <h3 class="text-center font-black mb-6">Bagong Sub-Deck</h3>
                <input id="inputSubDeck" type="text" placeholder="Chapter 1"
                    class="w-full bg-slate-50 p-4 rounded-xl mb-4 font-bold">
                <button onclick="actionCreateSubDeck()"
                    class="w-full bg-indigo-600 text-white py-4 rounded-xl font-black">IDAGDAG</button>
            </div>
            <div id="modalMagicImport" class="bg-white w-full max-w-xl rounded-[2.5rem] p-10 hidden flex-col">
                <h3 class="font-black mb-4">Magic Import ✨</h3>
                <textarea id="magicInput" placeholder="Term - Definition..."
                    class="w-full h-32 bg-slate-50 border p-4 rounded-2xl mb-4 font-mono text-sm"></textarea>
                <button onclick="processMagicImport(document.getElementById('magicInput').value)"
                    class="w-full bg-amber-500 text-white py-4 rounded-xl font-black">GENERATE</button>
                <button onclick="hideModals()" class="mt-4 text-slate-400 font-bold">Cancel</button>
            </div>
        </div>

        <script>
            const API_URL = window.location.origin;
            let library = [], activeDeck = null, expandedDecks = new Set();
            let queue = [], qIdx = 0, streak = 0, correctCount = 0;
            let currentCorrectAnswer = "", quizState = "asking", chartInstance = null;
            let currentQuizMode = "type", sessionHistory = [], mistakesQueue = [];
            let tempDeckToStudy = null; // Tracks which deck was clicked for study modal

            async function init() { await loadLibrary(); }

            async function loadLibrary() {
                const res = await fetch(`${API_URL}/api/library`);
                library = await res.json();
                if (!activeDeck && library.length > 0) activeDeck = library[0];
                else if (activeDeck) activeDeck = findDeck(activeDeck.id, library) || library[0];
                renderSidebar();
                renderWorkspace();
            }

            // --- STUDY PREPARATION ---
            function prepareStudy(deckOverride = null) {
                tempDeckToStudy = deckOverride || activeDeck;
                const total = getAllCardsRecursively(tempDeckToStudy).length;
                document.getElementById('availableCardsText').innerText = `${total} Available Cards`;
                document.getElementById('inputCardCount').max = total;
                document.getElementById('inputCardCount').value = total;
                showModal('modalStudySettings');
            }

            function confirmStudySettings() {
                const countInput = document.getElementById('inputCardCount').value;
                const totalCards = getAllCardsRecursively(tempDeckToStudy);
                const count = parseInt(countInput) || totalCards.length;

                hideModals();
                startLearning(tempDeckToStudy, count);
            }

            function startLearning(targetDeck, count) {
                const combined = getAllCardsRecursively(targetDeck);
                if (combined.length === 0) return;

                // Randomize Full List First
                const shuffled = [...combined].sort(() => 0.5 - Math.random());

                // Slice based on user selection
                queue = shuffled.slice(0, count);

                qIdx = 0; streak = 0; correctCount = 0; sessionHistory = []; mistakesQueue = [];
                currentQuizMode = "type";

                document.getElementById('quizContainer').classList.remove('hidden');
                document.getElementById('resultsScreen').classList.add('hidden');
                document.getElementById('learnOverlay').classList.remove('translate-y-full');
                loadQuestion();
            }

            // --- MASTERY LOGIC ---
            function calculateMastery(cards) {
                if (cards.length === 0) return 0;
                let totalPct = 0;
                cards.forEach(c => { if (c.attempt_count > 0) totalPct += (c.correct_count / c.attempt_count); });
                return Math.round((totalPct / cards.length) * 100);
            }

            async function trackMastery(cardId, isCorrect) {
                await fetch(`${API_URL}/api/cards/${cardId}/track`, {
                    method: 'PUT', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ isCorrect })
                });
            }

            // --- DB ACTIONS ---
            async function actionCreateMainDeck() {
                const name = document.getElementById('inputMainDeck').value;
                if (!name) return;
                const res = await fetch(`${API_URL}/api/decks`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, parent_id: null })
                });
                const data = await res.json();
                hideModals(); await loadLibrary(); selectDeck(data.id);
            }

            async function actionCreateSubDeck() {
                const name = document.getElementById('inputSubDeck').value;
                if (!name) return;
                const res = await fetch(`${API_URL}/api/decks`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, parent_id: activeDeck.id })
                });
                const data = await res.json();
                hideModals(); expandedDecks.add(activeDeck.id); await loadLibrary(); selectDeck(data.id);
            }

            async function deleteDeck(id) {
                if (!confirm("Burahin ang collection?")) return;
                await fetch(`${API_URL}/api/decks/${id}`, { method: 'DELETE' });
                activeDeck = null; await loadLibrary();
            }

            async function saveCard() {
                const ed = document.getElementById('editor');
                if (!ed.innerText.trim()) return;
                await fetch(`${API_URL}/api/cards`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ deck_id: activeDeck.id, html: ed.innerHTML, order_val: Date.now() })
                });
                ed.innerHTML = ''; await loadLibrary();
            }

            async function deleteCard(id) {
                await fetch(`${API_URL}/api/cards/${id}`, { method: 'DELETE' }); await loadLibrary();
            }

            async function deleteAllCards() {
                if (!confirm("Burahin lahat ng cards?")) return;
                await fetch(`${API_URL}/api/decks/${activeDeck.id}/cards`, { method: 'DELETE' }); await loadLibrary();
            }

            // --- QUIZ LOGIC ---
            function getAllCardsRecursively(deck) {
                let cards = [...deck.cards];
                if (deck.subDecks) deck.subDecks.forEach(sub => cards = cards.concat(getAllCardsRecursively(sub)));
                return cards;
            }

            function loadQuestion() {
                quizState = 'asking';
                const card = queue[qIdx];
                const temp = document.createElement('div'); temp.innerHTML = card.html;
                currentCorrectAnswer = temp.querySelector('.answer-highlight')?.innerText || "";
                document.getElementById('quizPrompt').innerHTML = card.html.replace(/<span class="answer-highlight">.*?<\/span>/g, '<span class="text-indigo-500 font-black border-b-2 border-indigo-100 px-2">_______</span>');
                document.getElementById('quizFeedback').innerText = "";
                document.getElementById('quizFeedback').classList.add('hidden');
                document.getElementById('quizProgressBar').style.width = ((qIdx / queue.length) * 100) + "%";
                renderInteraction();
            }

            function renderInteraction() {
                const zone = document.getElementById('interactionZone');
                zone.innerHTML = "";
                document.getElementById('btnAction').innerText = "Suriin ang Sagot";
                document.getElementById('btnAction').style.display = (currentQuizMode === "type") ? "block" : "none";
                document.getElementById('btnToggleMode').style.display = "block";
                document.getElementById('quizModeLabel').innerText = (currentQuizMode === "type") ? "Kabisado Mode" : "Pagpipilian Mode";

                if (currentQuizMode === "type") {
                    const input = document.createElement('input');
                    input.id = "userAnswer";
                    input.className = "w-full p-5 rounded-2xl border-2 border-slate-100 text-center text-xl font-bold outline-indigo-500";
                    input.onkeyup = (e) => { if (e.key === 'Enter') handleMainAction(); };
                    zone.appendChild(input);
                    setTimeout(() => input.focus(), 500);
                } else {
                    const choices = generateChoices(currentCorrectAnswer);
                    choices.forEach(choice => {
                        const btn = document.createElement('button');
                        btn.className = "w-full p-4 bg-white border-2 border-slate-100 rounded-2xl font-bold hover:border-indigo-500 hover:bg-indigo-50";
                        btn.innerText = choice;
                        btn.onclick = () => submitAnswer(choice);
                        zone.appendChild(btn);
                    });
                }
            }

            function generateChoices(correct) {
                let allDecoys = [...new Set(queue.map(c => {
                    const t = document.createElement('div'); t.innerHTML = c.html;
                    return t.querySelector('.answer-highlight')?.innerText;
                }))].filter(v => v && v !== correct);
                let selected = allDecoys.sort(() => 0.5 - Math.random()).slice(0, 3);
                selected.push(correct);
                return selected.sort(() => 0.5 - Math.random());
            }

            async function handleMainAction() {
                if (quizState === 'asking') {
                    const val = document.getElementById('userAnswer').value.trim();
                    if (val) submitAnswer(val);
                } else if (quizState === 'feedback') {
                    qIdx++;
                    if (qIdx < queue.length) loadQuestion(); else showResults();
                }
            }

            async function submitAnswer(userVal) {
                const card = queue[qIdx];
                const fb = document.getElementById('quizFeedback');
                fb.classList.remove('hidden');
                fb.innerText = "Sinisiyasat ni Lado... 🧐";
                quizState = 'checking';

                let isCorrect = false;
                if (currentQuizMode === "type") {
                    const res = await fetch(`${API_URL}/verify`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userAnswer: userVal, correctAnswer: currentCorrectAnswer })
                    });
                    const data = await res.json();
                    isCorrect = data.isCorrect;
                } else {
                    isCorrect = userVal === currentCorrectAnswer;
                }

                await trackMastery(card.id, isCorrect);
                if (!isCorrect) mistakesQueue.push(card);

                quizState = 'feedback';
                fb.innerText = isCorrect ? (userVal.toLowerCase() === currentCorrectAnswer.toLowerCase() ? "Tama! ✨" : `Pwede na! (${currentCorrectAnswer})`) : `Mali! Sagot: ${currentCorrectAnswer}`;
                fb.className = `mt-8 font-bold ${isCorrect ? 'text-emerald-500' : 'text-rose-500'}`;

                if (isCorrect) {
                    streak++; correctCount++;
                    confetti({ particleCount: 30, spread: 50, origin: { y: 0.8 } });
                } else { streak = 0; }

                sessionHistory.push({ prompt: document.getElementById('quizPrompt').innerText, correct: currentCorrectAnswer, user: userVal, isCorrect: isCorrect });
                document.getElementById('streakCount').innerText = streak;
                document.getElementById('btnAction').innerText = "Susunod →";
                document.getElementById('btnAction').style.display = "block";
                document.getElementById('btnToggleMode').style.display = "none";
                if (document.getElementById('userAnswer')) document.getElementById('userAnswer').disabled = true;
                document.querySelectorAll('#interactionZone button').forEach(b => b.disabled = true);
            }

            function showResults() {
                document.getElementById('quizContainer').classList.add('hidden');
                document.getElementById('resultsScreen').classList.remove('hidden');
                document.getElementById('scoreText').innerText = `${correctCount} / ${queue.length} Tama`;

                const restudyArea = document.getElementById('restudyMistakesContainer');
                restudyArea.innerHTML = "";
                if (mistakesQueue.length > 0) {
                    restudyArea.innerHTML = `<button onclick="restudyMistakes()" class="w-full bg-amber-500 text-white py-5 rounded-3xl font-black shadow-xl uppercase">Re-study ${mistakesQueue.length} Mistakes 🎯</button>`;
                }

                const list = document.getElementById('summaryList');
                list.innerHTML = "";
                sessionHistory.forEach(item => {
                    list.innerHTML += `<div class="bg-white p-5 rounded-3xl border flex justify-between items-center"><div class="flex-1"><p class="text-xs text-slate-400 font-bold uppercase">Question</p><p class="text-sm font-bold text-slate-700">${item.prompt}</p></div><div class="text-right"><p class="text-[10px] font-black uppercase ${item.isCorrect ? 'text-emerald-500' : 'text-rose-400'}">${item.isCorrect ? 'Correct' : 'Incorrect'}</p><p class="text-sm font-black text-indigo-600">${item.correct}</p></div></div>`;
                });

                const ctx = document.getElementById('scoreChart').getContext('2d');
                if (chartInstance) chartInstance.destroy();
                chartInstance = new Chart(ctx, { type: 'doughnut', data: { datasets: [{ data: [correctCount, queue.length - correctCount], backgroundColor: ['#6366f1', '#f1f5f9'], borderWidth: 0 }] }, options: { cutout: '80%', plugins: { legend: { display: false } } } });
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                loadLibrary();
            }

            function restudyMistakes() {
                queue = [...mistakesQueue].sort(() => 0.5 - Math.random());
                mistakesQueue = []; qIdx = 0; streak = 0; correctCount = 0; sessionHistory = [];
                document.getElementById('resultsScreen').classList.add('hidden');
                document.getElementById('quizContainer').classList.remove('hidden');
                loadQuestion();
            }

            // --- RENDERERS ---
            function renderSidebar() {
                const container = document.getElementById('sidebarNav');
                container.innerHTML = '';
                const renderRecursive = (decks, level = 0) => {
                    decks.forEach(deck => {
                        const isActive = activeDeck && activeDeck.id === deck.id;
                        const isExpanded = expandedDecks.has(deck.id);
                        const div = document.createElement('div');
                        div.className = `sidebar-item flex items-center justify-between px-4 py-2 rounded-xl cursor-pointer text-sm font-bold transition-all ${isActive ? 'bg-indigo-50 text-indigo-700' : 'text-slate-500 hover:bg-slate-50'}`;
                        div.style.marginLeft = (level * 12) + "px";
                        div.onclick = () => selectDeck(deck.id);
                        const arrow = deck.subDecks.length > 0 ? `<span onclick="event.stopPropagation(); toggleFolder(${deck.id})" class="chevron ${isExpanded ? 'open' : ''}">▶</span>` : `<span class="w-3"></span>`;
                        div.innerHTML = `<div class="flex items-center truncate">${arrow} <span class="ml-2">${deck.name}</span></div>
                        ${getAllCardsRecursively(deck).length > 0 ? `<button onclick="event.stopPropagation(); prepareStudy(${findDeck(deck.id, library)})" class="study-btn-sm text-indigo-400">🚀</button>` : ''}`;
                        container.appendChild(div);
                        if (deck.subDecks.length > 0 && isExpanded) renderRecursive(deck.subDecks, level + 1);
                    });
                };
                renderRecursive(library);
            }

            function renderWorkspace() {
                if (!activeDeck) return;
                const allCards = getAllCardsRecursively(activeDeck);
                const masteryPct = calculateMastery(allCards);

                document.getElementById('activeDeckTitle').innerText = activeDeck.name;
                document.getElementById('btnStartLearn').style.display = allCards.length > 0 ? 'block' : 'none';
                document.getElementById('cardControls').classList.toggle('hidden', activeDeck.cards.length < 1);
                document.getElementById('delDeckBtn').onclick = () => deleteDeck(activeDeck.id);

                const masteryBox = document.getElementById('masteryContainer');
                masteryBox.classList.remove('hidden');
                masteryBox.innerHTML = `<div class="bg-white p-6 rounded-[2rem] border shadow-sm mb-6"><div class="flex justify-between items-center mb-2"><span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Mastery Progress</span><span class="text-sm font-black text-indigo-600">${masteryPct}%</span></div><div class="w-full h-3 bg-slate-100 rounded-full overflow-hidden"><div class="h-full bg-indigo-500 transition-all duration-1000" style="width: ${masteryPct}%"></div></div></div>`;

                const fGrid = document.getElementById('subFolderGrid'); fGrid.innerHTML = '';
                activeDeck.subDecks.forEach(sub => {
                    const count = getAllCardsRecursively(sub).length;
                    const card = document.createElement('div');
                    card.className = "bg-white p-5 rounded-[2.5rem] border shadow-sm text-center cursor-pointer hover:border-indigo-400 flex flex-col items-center justify-center";
                    card.onclick = () => selectDeck(sub.id);
                    card.innerHTML = `<div class="text-3xl mb-1">📂</div><h4 class="text-[10px] font-bold uppercase truncate">${sub.name}</h4><p class="text-[8px] text-slate-400">${count} Cards</p>${count > 0 ? `<button onclick="event.stopPropagation(); prepareStudy(${findDeck(sub.id, library)})" class="mt-3 w-full py-2 bg-slate-900 text-white text-[8px] font-black rounded-lg">STUDY</button>` : ''}`;
                    fGrid.appendChild(card);
                });

                const cGrid = document.getElementById('cardsGrid'); cGrid.innerHTML = '';
                activeDeck.cards.forEach((card) => {
                    const div = document.createElement('div');
                    div.className = "bg-white p-6 rounded-[2rem] border relative group";
                    div.innerHTML = `<button onclick="deleteCard(${card.id})" class="absolute top-4 right-4 text-slate-200 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all">✕</button><div class="text-slate-700">${card.html}</div>`;
                    cGrid.appendChild(div);
                });
            }

            // --- UTILS ---
            function findDeck(id, list) { for (let d of list) { if (d.id === id) return d; if (d.subDecks) { let f = findDeck(id, d.subDecks); if (f) return f; } } }
            function selectDeck(id) { activeDeck = findDeck(id, library); renderWorkspace(); renderSidebar(); }
            function toggleFolder(id) { expandedDecks.has(id) ? expandedDecks.delete(id) : expandedDecks.add(id); renderSidebar(); }
            function toggleQuizMode() { currentQuizMode = (currentQuizMode === "type") ? "choice" : "type"; renderInteraction(); }
            function startLearningById(id) { prepareStudy(findDeck(id, library)); }
            function showModal(id) { document.getElementById('modalOverlay').classList.add('modal-active'); document.getElementById(id).classList.remove('hidden'); document.getElementById(id).classList.add('flex'); }
            function hideModals() { document.getElementById('modalOverlay').classList.remove('modal-active'); document.querySelectorAll('#modalOverlay > div').forEach(d => d.classList.add('hidden')); }
            function exitLearning() { document.getElementById('learnOverlay').classList.add('translate-y-full'); }
            function markAsAnswer() { const sel = window.getSelection(); if (sel.rangeCount) { const span = document.createElement('span'); span.className = 'answer-highlight'; sel.getRangeAt(0).surroundContents(span); } }
            function shuffleCards() { activeDeck.cards.sort(() => Math.random() - 0.5); renderWorkspace(); }
            function resetOrder() { activeDeck.cards.sort((a, b) => a.order_val - b.order_val); renderWorkspace(); }
            async function processMagicImport(txt) {
                const lines = txt.split('\n').filter(l => l.includes('-'));
                const baseTime = Date.now();
                for (let i = 0; i < lines.length; i++) {
                    const [t, d] = lines[i].split('-');
                    await fetch(`${API_URL}/api/cards`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ deck_id: activeDeck.id, html: `<span class="answer-highlight">${t.trim()}</span> - ${d.trim()}`, order_val: baseTime + i })
                    });
                }
                hideModals(); await loadLibrary();
            }

            init();
        </script>
    </body>

    </html>
